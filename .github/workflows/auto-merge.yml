name: Auto Merge Minor AI Changes

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-after-ci:
    name: Merge labeled PR after CI passes
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Merge eligible minor AI PR
        run: |
          set -euo pipefail

          pr_json=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/commits/${SHA}/pulls" \
            --jq 'map(select(.state == "open" and .base.ref == "main")) | first')

          if [ "$pr_json" = "null" ] || [ -z "$pr_json" ]; then
            echo "No open PR targeting main for ${SHA}."
            exit 0
          fi

          pr_number=$(echo "$pr_json" | jq -r '.number')
          is_draft=$(echo "$pr_json" | jq -r '.draft')
          head_repo=$(echo "$pr_json" | jq -r '.head.repo.full_name')
          has_label=$(echo "$pr_json" | jq -r '[.labels[].name] | index("ai-minor-change") != null')

          if [ "$is_draft" != "false" ]; then
            echo "PR #${pr_number} is draft; skipping."
            exit 0
          fi

          if [ "$head_repo" != "$REPO" ]; then
            echo "PR #${pr_number} is from ${head_repo}; skipping fork PR."
            exit 0
          fi

          if [ "$has_label" != "true" ]; then
            echo "PR #${pr_number} does not have ai-minor-change label; skipping."
            exit 0
          fi

          changed_files=$(gh pr view "$pr_number" --repo "$REPO" --json files --jq '.files[].path')

          if [ -z "$changed_files" ]; then
            echo "PR #${pr_number} has no changed files; skipping."
            exit 0
          fi

          echo "Changed files:"
          echo "$changed_files"

          disallowed_files=$(echo "$changed_files" | grep -Ev '^(src/|index\.html$)' || true)

          if [ -n "$disallowed_files" ]; then
            echo "PR #${pr_number} touches files outside the small UI allowlist; skipping auto-merge."
            echo "$disallowed_files"
            exit 0
          fi

          sensitive_files=$(echo "$changed_files" | grep -E '(^|/)(migrations|db|database|auth|payments|billing|contracts|infra|server)(/|$)|(^|/)\.env|^\.github/workflows/|(^|/)package(-lock)?\.json$|(^|/)vite\.config\.js$|(^|/)eslint\.config\.js$' || true)

          if [ -n "$sensitive_files" ]; then
            echo "PR #${pr_number} touches sensitive files; skipping auto-merge."
            echo "$sensitive_files"
            exit 0
          fi

          gh pr merge "$pr_number" --repo "$REPO" --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.workflow_run.head_sha }}
